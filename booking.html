<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קביעת תור - ד"ר עמיר</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --accent-orange: #ff6f00;
            --bg-light: #f8f9fa;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* שורת ניווט מותאמת */
        header {
            background: #ffffff;
            border-bottom: 2px solid #eef2f5;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-blue);
            text-decoration: none;
        }

        .logo img {
            height: 45px;
            width: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-orange);
        }

        /* מיכל הטופס */
        .form-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-blue);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h1 {
            color: var(--primary-blue);
            font-size: 28px;
            margin-bottom: 10px;
        }

        /* שדות הטופס מותאמים */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccd4da;
            border-radius: 8px;
            font-size: 16px; /* מונע זום אוטומטי באייפון */
            background-color: #ffffff;
            color: var(--text-dark);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0,86,179,0.1);
        }

        /* כפתור שליחה מותאם למובייל */
        .submit-btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #e66500;
        }

        /* התאמות ספציפיות למובייל וטאבלטים */
        @media (max-width: 768px) {
            .form-wrapper {
                margin: 15px;
                padding: 20px;
            }

            .form-header h1 {
                font-size: 24px;
            }

            .nav-container {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <img src="Logo.png" alt="לוגו">
                <span>ד"ר עמיר</span>
            </a>
            <div class="nav-links">
                <a href="index.html">חזרה לדף הבית</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="form-wrapper">
            <div class="form-header">
                <h1>קביעת תור למרפאה</h1>
                <p>מלאו את הפרטים ונחזור אליכם לאישור סופי</p>
            </div>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="fullName">שם מלא</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="ישראל ישראלי">
                </div>

                <div class="form-group">
                    <label for="phone">מספר טלפון</label>
                    <input type="tel" id="phone" name="phone" required placeholder="050-1234567">
                </div>

                <div class="form-group">
                    <label for="petType">סוג חיית המחמד</label>
                    <select id="petType" name="petType" required>
                        <option value="" disabled selected>בחרו מתוך הרשימה</option>
                        <option value="כלב">כלב</option>
                        <option value="חתול">חתול</option>
                        <option value="אחר">אחר</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">תאריך מועדף</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="notes">הערות או סיבת הביקור (אופציונלי)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="למשל: חיסון שנתי, בדיקה כללית..."></textarea>
                </div>

                <button type="submit" class="submit-btn">שליחת בקשה לתור</button>
            </form>
        </div>
    </main>

</body>
</html>
